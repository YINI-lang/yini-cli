# Runs the shared YINI conformance smoke suite against the built yini-cli command.

name: YINI Test Suite Smoke

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']
    workflow_dispatch:

jobs:
    yini-test-suite-smoke:
        name: Run YINI smoke suite
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: npm

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: pip

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Build yini-cli
              run: npm run build

            - name: Install YINI test suite
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install --upgrade --pre yini-test-suite==0.3.0b2

            - name: Run YINI test suite smoke (lenient)
              run: >
                  yini-test-suite smoke
                  --show-progress
                  --adapter node ./tools/yini-test-suite-adapter.mjs
                  --input {input}
                  --mode {mode}

            - name: Run YINI test suite smoke (strict)
              run: >
                  yini-test-suite smoke
                  --strict
                  --show-progress
                  --adapter node ./tools/yini-test-suite-adapter.mjs
                  --input {input}
                  --mode {mode}
