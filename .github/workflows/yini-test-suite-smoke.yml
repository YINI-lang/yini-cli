# GitHub Actions workflow for checking yini-cli against the shared YINI test suite.
# It builds the CLI, installs the external test suite, and runs smoke tests in lenient and strict modes.

name: (external) YINI Test Suite Smoke Tests

on:
    push:
        branches: ['main']
    pull_request:
        branches: ['main']
    workflow_dispatch:

jobs:
    yini-test-suite-smoke:
        name: Run YINI smoke suite
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v7

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: npm

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.12'

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Build yini-cli
              run: npm run build

            - name: Install YINI test suite
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install --upgrade --pre yini-test-suite==0.3.0b2

            - name: Run YINI test suite smoke tests in lenient mode
              run: >
                  yini-test-suite smoke
                  --show-progress
                  --adapter node ./tools/yini-test-suite-adapter.mjs
                  --input '{input}'
                  --mode '{mode}'

            - name: Run YINI test suite smoke tests in strict mode
              run: >
                  yini-test-suite smoke
                  --strict
                  --show-progress
                  --adapter node ./tools/yini-test-suite-adapter.mjs
                  --input '{input}'
                  --mode '{mode}'
